version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_trading
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-NexusSecure2024!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexus_trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-NexusRedis2024!}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: nexus_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://nexus_user:${DB_PASSWORD:-NexusSecure2024!}@postgres:5432/nexus_trading
      REDIS_URL: redis://:${REDIS_PASSWORD:-NexusRedis2024!}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-NexusJWT2024SuperSecretKey}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    image: nginx:alpine
    container_name: nexus_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
