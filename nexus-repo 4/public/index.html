<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEXUS — Institutional Trading Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050A0F;--bgCard:#0A1520;--bgPanel:#0D1B2A;--border:#1A3048;
  --accent:#00D4FF;--green:#00FF88;--red:#FF3366;--orange:#FF8C42;
  --purple:#8B5CF6;--gold:#FFD700;--text:#E8F4FD;--muted:#6B8FA8;--dim:#3A5A70;
  --chart:#060C14;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-size:14px}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bgCard)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes tickerMove{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes scanLine{0%{top:-2%}100%{top:102%}}
@keyframes spin{to{transform:rotate(360deg)}}

/* SCREENS */
.screen{position:absolute;inset:0;overflow:hidden;animation:fadeIn .25s ease}
.screen.hidden{display:none!important}

/* TYPOGRAPHY */
.mono{font-family:'JetBrains Mono',monospace}
.raj{font-family:'Rajdhani',sans-serif}
.lbl{color:var(--muted);font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;display:block;margin-bottom:4px}
.c-accent{color:var(--accent)}.c-green{color:var(--green)}.c-red{color:var(--red)}
.c-gold{color:var(--gold)}.c-muted{color:var(--muted)}.c-dim{color:var(--dim)}.c-orange{color:var(--orange)}
.c-purple{color:var(--purple)}.c-text{color:var(--text)}
.f700{font-weight:700}.f800{font-weight:800}
.fs10{font-size:10px}.fs11{font-size:11px}.fs12{font-size:12px}.fs13{font-size:13px}
.fs16{font-size:16px}.fs18{font-size:18px}.fs20{font-size:20px}.fs22{font-size:22px}
.ls1{letter-spacing:1px}.ls2{letter-spacing:2px}.ls3{letter-spacing:3px}

/* LAYOUT */
.flex{display:flex}.col{flex-direction:column}.wrap{flex-wrap:wrap}
.aic{align-items:center}.aifs{align-items:flex-start}
.jcb{justify-content:space-between}.jcc{justify-content:center}
.g4{gap:4px}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g16{gap:16px}.g20{gap:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4c{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.gauto{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.span2{grid-column:span 2}
.w100{width:100%}.h100{height:100%}
.oa{overflow:auto}.oh{overflow:hidden}.oy{overflow-y:auto}.ox{overflow-x:auto}
.tc{text-align:center}.tr{text-align:right}
.rel{position:relative}.abs{position:absolute}
.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nowrap{white-space:nowrap}
.shrink0{flex-shrink:0}
.mla{margin-left:auto}
.p6{padding:6px}.p8{padding:8px}.p10{padding:10px}.p12{padding:12px}.p14{padding:14px}.p16{padding:16px}.p20{padding:20px}.p24{padding:24px}
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.ml4{margin-left:4px}.ml8{margin-left:8px}.ml12{margin-left:12px}
.mr8{margin-right:8px}

/* CARDS */
.card{background:var(--bgCard);border:1px solid var(--border);border-radius:8px}
.card-glow{background:var(--bgCard);border:1px solid rgba(0,212,255,.25);border-radius:8px;box-shadow:0 0 24px rgba(0,212,255,.06)}

/* BUTTONS */
.btn{border:none;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:600;border-radius:4px;transition:all .15s;letter-spacing:.5px;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}
.btn-primary{background:var(--accent);color:var(--bg);padding:9px 18px;font-size:12px}
.btn-primary:hover{background:#22E0FF;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,212,255,.3)}
.btn-buy{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3);padding:10px 20px;font-size:13px;font-weight:700}
.btn-buy:hover{background:rgba(0,255,136,.2);box-shadow:0 0 16px rgba(0,255,136,.2)}
.btn-sell{background:rgba(255,51,102,.1);color:var(--red);border:1px solid rgba(255,51,102,.3);padding:10px 20px;font-size:13px;font-weight:700}
.btn-sell:hover{background:rgba(255,51,102,.2);box-shadow:0 0 16px rgba(255,51,102,.2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);padding:6px 12px;font-size:11px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(255,51,102,.1);color:var(--red);border:1px solid rgba(255,51,102,.25);padding:4px 10px;font-size:10px;font-weight:600}
.btn-danger:hover{background:rgba(255,51,102,.25)}
.btn-sm{padding:4px 10px;font-size:10px}
.btn-xs{padding:3px 8px;font-size:10px}

/* INPUTS */
.inp{background:var(--bgPanel);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:8px 12px;font-family:'Exo 2',sans-serif;font-size:12px;outline:none;width:100%;transition:border .15s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,212,255,.15)}
.inp::placeholder{color:var(--dim)}
.inp-mono{font-family:'JetBrains Mono',monospace}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.8px;font-family:'Rajdhani',sans-serif}
.b-buy{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.b-sell{background:rgba(255,51,102,.1);color:var(--red);border:1px solid rgba(255,51,102,.3)}
.b-neutral{background:rgba(107,143,168,.1);color:var(--muted);border:1px solid rgba(107,143,168,.25)}
.b-warn{background:rgba(255,140,66,.1);color:var(--orange);border:1px solid rgba(255,140,66,.3)}
.b-purple{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.3)}
.b-admin{background:rgba(255,140,66,.12);color:var(--orange);border:1px solid rgba(255,140,66,.3)}

/* TABS */
.tabs{display:flex;gap:2px;flex-wrap:nowrap}
.tab{padding:5px 11px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:.5px;transition:all .15s;color:var(--muted);background:transparent;border:none;font-family:'Exo 2',sans-serif;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.on{background:rgba(0,212,255,.12);color:var(--accent)}

/* DOT */
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-g{background:var(--green);animation:pulse 1.5s infinite}
.dot-r{background:var(--red)}
.dot-d{background:var(--dim)}
.dot-a{background:var(--accent);animation:pulse 1.5s infinite}
.dot-o{background:var(--orange)}

/* TOGGLE */
.tog{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;transition:background .3s;flex-shrink:0;border:none;display:inline-block}
.tog-k{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .25s;pointer-events:none}

/* PROGRESS */
.pbar{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .4s}

/* LOADER */
.loader{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-family:'Exo 2',sans-serif}
td{padding:5px 8px;border-bottom:1px solid rgba(26,48,72,.4);font-family:'JetBrains Mono',monospace;font-size:11px;vertical-align:middle}
tr:hover td{background:rgba(0,212,255,.03)}

/* DIVIDER */
.hr{border:none;border-top:1px solid var(--border);margin:12px 0}

/* TERMINAL LAYOUT */
#T{height:100%;display:flex;flex-direction:column;background:var(--bg)}
#T-hdr{background:var(--bgCard);border-bottom:1px solid var(--border);height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0;gap:8px;overflow:hidden}
#T-ticker{background:var(--bgPanel);border-bottom:1px solid var(--border);height:30px;overflow:hidden;display:flex;align-items:center;flex-shrink:0}
#T-ticker-inner{display:flex;animation:tickerMove 90s linear infinite;white-space:nowrap}
.tick-item{display:inline-flex;align-items:center;gap:6px;padding:0 14px;border-right:1px solid rgba(26,48,72,.4);font-family:'JetBrains Mono',monospace;font-size:10px}
#T-body{flex:1;overflow:hidden;position:relative}

/* PANELS — single unified system, no conflicting CSS */
.panel{position:absolute;inset:0;overflow:hidden;display:none}
.panel.on{display:flex;flex-direction:column}

/* CHART PANEL GRID */
#P-chart{display:none;grid-template-columns:176px 1fr 220px;gap:8px;padding:8px}
#P-chart.on{display:grid}
#wl-col{overflow:hidden;display:flex;flex-direction:column}
#chart-mid{display:flex;flex-direction:column;gap:8px;overflow:hidden;min-width:0}
#chart-right{display:flex;flex-direction:column;gap:8px;overflow:hidden}

/* SCROLLABLE PANELS */
#P-positions,#P-analytics,#P-ai,#P-mt5,#P-copy,#P-audit{overflow-y:auto;padding:14px}

/* OPEN TRADES */
#ot-wrap{max-height:135px;overflow-y:auto}

/* WATCHLIST */
#wl-list{overflow-y:auto;flex:1}
.wl-row{padding:6px 8px;cursor:pointer;border-radius:4px;border-left:2px solid transparent;margin-bottom:1px;display:flex;justify-content:space-between;align-items:center;transition:all .1s}
.wl-row:hover{background:rgba(0,212,255,.05)}
.wl-row.sel{background:rgba(0,212,255,.08);border-left-color:var(--accent)}

/* ORDER BOX */
.pricebox{text-align:center;border-radius:4px;padding:8px 4px}
.ask-box{background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.25)}
.bid-box{background:rgba(255,51,102,.07);border:1px solid rgba(255,51,102,.25)}

/* EMOTION */
#em-card{padding:14px;transition:all .3s}
#em-card.on{border-color:rgba(139,92,246,.5);box-shadow:0 0 20px rgba(139,92,246,.1)}
#em-detail{display:none;background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.25);border-radius:4px;padding:10px;font-size:10px;color:var(--purple);line-height:1.85;margin-top:10px;animation:slideIn .25s ease}

/* LANDING */
#L{overflow-y:auto;height:100%;background:var(--bg)}
.hero-glow{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,212,255,.06),transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,.06),transparent 55%);pointer-events:none;z-index:0}
.gridbg{position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(26,48,72,.3) 40px,rgba(26,48,72,.3) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(26,48,72,.3) 40px,rgba(26,48,72,.3) 41px);pointer-events:none;z-index:0;opacity:.4}
.hero-h1{font-size:clamp(30px,5.5vw,68px);font-weight:800;font-family:'Rajdhani',sans-serif;line-height:1.05;letter-spacing:2px}
.grad{background:linear-gradient(90deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.feat-card{padding:22px;border:1px solid var(--border);border-radius:8px;transition:all .2s;cursor:default;background:var(--bgCard)}
.feat-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,212,255,.1)}
.compliance-tag{background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.25);border-radius:4px;padding:5px 12px;font-size:10px;color:var(--green);font-family:'JetBrains Mono';letter-spacing:.5px}
.lnav{position:sticky;top:0;z-index:100;background:rgba(5,10,15,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 36px}
.lsec{max-width:1080px;margin:0 auto;padding:0 32px}
.footer-link{color:var(--muted);font-size:11px;cursor:pointer;text-decoration:underline;white-space:nowrap}

/* AUTH */
#A{overflow-y:auto;height:100%;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-wrap{width:100%;max-width:426px;animation:slideIn .35s ease}
.auth-logo{width:50px;height:50px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:19px;color:#fff;font-family:'Rajdhani',sans-serif;margin:0 auto 12px}
.seg-btn{flex:1;padding:8px 0;border:none;border-radius:4px;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;transition:all .15s}
.err-box{background:rgba(255,51,102,.1);border:1px solid rgba(255,51,102,.3);border-radius:4px;padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:12px;display:none}
.demo-box{margin-top:12px;background:var(--bgPanel);border-radius:6px;padding:12px;border:1px solid var(--border)}

/* ADMIN */
#AD{height:100%;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
#AD-hdr{background:var(--bgCard);border-bottom:1px solid rgba(255,140,66,.35);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
#AD-body{flex:1;overflow-y:auto;padding:20px}

/* NOTIF */
#notif{position:fixed;top:72px;right:18px;z-index:9999;background:var(--bgCard);border-radius:6px;padding:9px 15px;font-size:12px;font-family:'JetBrains Mono',monospace;animation:slideIn .3s ease;display:none;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.4)}

/* RESPONSIVE */
@media(max-width:900px){#P-chart.on{grid-template-columns:1fr!important}#wl-col,#chart-right{display:none!important}}
@media(max-width:640px){.g4c{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}#T-hdr .tabs{overflow-x:auto}}
canvas{display:block}
</style>
</head>
<body>

<div id="screen-landing" class="screen hidden"></div>
<div id="screen-auth"    class="screen hidden"></div>
<div id="screen-term"   class="screen hidden"></div>
<div id="screen-admin"  class="screen hidden"></div>
<div id="notif"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
//  NEXUS TRADING PLATFORM v2.1.0 — Full Audit Build
// ═══════════════════════════════════════════════════════════
const VER = '2.1.0';
const C = {bg:'#050A0F',card:'#0A1520',panel:'#0D1B2A',bdr:'#1A3048',
  acc:'#00D4FF',grn:'#00FF88',red:'#FF3366',ora:'#FF8C42',
  pur:'#8B5CF6',gld:'#FFD700',txt:'#E8F4FD',mut:'#6B8FA8',dim:'#3A5A70',chart:'#060C14'};

// ─── SECURITY ────────────────────────────────────────────

// =============================================================
//  API CLIENT - connects to Vercel/Express backend
//  Falls back gracefully to in-memory demo mode if unavailable
// =============================================================
const API = (() => {
  const BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3001' : '';
  let _token = sessionStorage.getItem('nx_jwt') || null;
  let _mode  = null;

  async function probe() {
    if (_mode) return _mode === 'api';
    try {
      const r = await fetch(BASE + '/api/health', { signal: AbortSignal.timeout(2500) });
      _mode = r.ok ? 'api' : 'demo';
    } catch { _mode = 'demo'; }
    const style = _mode === 'api' ? 'color:#00D4FF;font-weight:bold' : 'color:#FF8C42;font-weight:bold';
    const msg   = _mode === 'api' ? '[NEXUS] Backend connected' : '[NEXUS] Demo mode (in-memory)';
    console.info('%c' + msg, style);
    return _mode === 'api';
  }

  async function req(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    if (_token) headers['Authorization'] = 'Bearer ' + _token;
    const opts = { method, headers };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(BASE + path, opts);
    const data = await r.json().catch(() => ({ error: 'Invalid JSON' }));
    if (!r.ok) { const e = new Error(data.error || r.statusText); e.status = r.status; throw e; }
    return data;
  }
  const _get  = p      => req('GET',    p);
  const _post = (p, b) => req('POST',   p, b);
  const _pat  = (p, b) => req('PATCH',  p, b);
  const _del  = p      => req('DELETE', p);

  return {
    get isAPIMode() { return _mode === 'api'; },
    get token()     { return _token; },
    probe,
    // AUTH
    async login(email, password) {
      const d = await _post('/api/auth/login', { email, password });
      _token = d.token; sessionStorage.setItem('nx_jwt', d.token); return d.user;
    },
    async register(email, password, name, gdpr) {
      const d = await _post('/api/auth/register', { email, password, name, gdpr });
      _token = d.token; sessionStorage.setItem('nx_jwt', d.token); return d.user;
    },
    async logout()  { try { await _post('/api/auth/logout'); } catch {} _token = null; sessionStorage.removeItem('nx_jwt'); },
    async me()      { return (await _get('/api/auth/me')).user; },
    // ACCOUNTS
    async getAccounts()           { return _get('/api/accounts'); },
    async addAccount(d)           { return _post('/api/accounts', d); },
    async deleteAccount(id)       { return _del('/api/accounts/' + id); },
    async updateAccount(id, d)    { return _pat('/api/accounts/' + id, d); },
    // TRADES
    async getTrades(p = {}) {
      const qs = new URLSearchParams(p).toString();
      return _get('/api/trades' + (qs ? '?' + qs : ''));
    },
    async addTrade(d)             { return _post('/api/trades', d); },
    async closeTrade(id, d)       { return _pat('/api/trades/' + id, d); },
    async deleteTrade(id)         { return _del('/api/trades/' + id); },
    // ANALYTICS + CALENDAR
    async getAnalytics(accountId) { return _get('/api/analytics/' + accountId); },
    async getCalendar(accountId, year, month) {
      const q = new URLSearchParams({ account_id: accountId, ...(year && {year}), ...(month && {month}) });
      return _get('/api/calendar?' + q);
    },
    // COPY
    async getCopyAccounts()       { return _get('/api/copy'); },
    async addCopyAccount(d)       { return _post('/api/copy', d); },
    async updateCopyAccount(id,d) { return _pat('/api/copy/' + id, d); },
    async deleteCopyAccount(id)   { return _del('/api/copy/' + id); },
    // AI
    async aiChat(message, conversationId, context) {
      return _post('/api/ai/chat', { message, conversation_id: conversationId, context });
    },
    async getConversations()      { return _get('/api/ai/conversations'); },
    // BROKERS / INSTRUMENTS
    async searchBrokers(q = '')   { return _get('/api/brokers?q=' + encodeURIComponent(q)); },
    async getInstruments(cat)     { return _get('/api/instruments' + (cat ? '?category=' + cat : '')); },
    // NOTIFICATIONS
    async getNotifications()      { return _get('/api/notifications'); },
    async markRead(id)            { return _pat('/api/notifications' + (id ? '/' + id : '')); },
    async deleteNotification(id)  { return _del('/api/notifications/' + id); },
    // AUDIT + ADMIN
    async getAuditLog()           { return _get('/api/audit'); },
    async getAdminStats()         { return _get('/api/admin/stats'); },
    async getAdminUsers()         { return _get('/api/admin/users'); },
    async updateUser(id, d)       { return _pat('/api/admin/users?id=' + id, d); },
    async deactivateUser(id)      { return _del('/api/admin/users?id=' + id); },
  };
})();

const Sec = {
  token(){const a=new Uint8Array(32);crypto.getRandomValues(a);return Array.from(a).map(b=>b.toString(16).padStart(2,'0')).join('')},
  hash(s){return btoa(unescape(encodeURIComponent(s+'_NX2024')))},
  clean(s){return String(s).replace(/<[^>]*>/g,'').replace(/['"`;]/g,'').trim()},
  email(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}
};

// ─── AUDIT ────────────────────────────────────────────────
const Log = {

const Mkt = {
  px:{}, candles:{}, subs:new Map(), _tid:null,
  _vol:{},
  init(){
    PAIRS.forEach(p=>{
      const sp=SPR[p]||0.0001;
      this._vol[p]=sp*3;
      this.px[p]={bid:BASE[p],ask:BASE[p]+sp,chg:0,pct:0,hi:BASE[p]*1.002,lo:BASE[p]*0.998,vol:Math.floor(Math.random()*100000+50000)};
      this._genCandles(p);
    });
  },
  _genCandles(pair){
    const base=BASE[pair], vol=(SPR[pair]||0.0001)*15, c=[];
    let price=base;
    for(let i=200;i>=0;i--){
      const o=price,ch=(Math.random()-.5)*vol*2,cl=o+ch;
      c.push({t:Date.now()-(i*3600000),o,h:Math.max(o,cl)+Math.random()*vol*.5,l:Math.min(o,cl)-Math.random()*vol*.5,c:cl,v:Math.floor(Math.random()*50000+10000)});
      price=cl;
    }
    this.candles[pair]=c;
  },
  start(){if(this._tid)return;this._run()},
  stop(){clearTimeout(this._tid);this._tid=null},
  _run(){
    PAIRS.forEach(p=>{
      const vol=this._vol[p], prev=this.px[p].bid, sp=SPR[p]||0.0001;
      const nb=Math.max(prev*.92,prev+(Math.random()-.499)*vol*.8), chg=nb-BASE[p];
      this.px[p]={bid:nb,ask:nb+sp,chg,pct:(chg/BASE[p])*100,hi:Math.max(this.px[p].hi,nb),lo:Math.min(this.px[p].lo,nb),vol:this.px[p].vol+Math.floor(Math.random()*80)};
    });
    this.subs.forEach(cb=>{try{cb(this.px)}catch(e){}});
    this._tid=setTimeout(()=>this._run(),220+Math.random()*260);
  },

const TE = {
  open:[],hist:[],bal:10000,eq:10000,nid:1000,subs:new Set(),
  place({pair,side,lots,sl,tp,price,uid='user'}){
    const t={id:this.nid++,pair,side,lots,op:price,cp:price,sl:sl||0,tp:tp||0,ot:new Date().toISOString(),pl:0,pips:0,uid,mg:lots*100*price*.01};
    this.open.push(t); this.bal-=t.mg;
    Log.add(uid,'TRADE_OPEN',{pair,side,lots,price});
    this._fire(); return t;
  },
  close(id,price,uid='user'){
    const i=this.open.findIndex(t=>t.id===id);if(i<0)return null;
    const t=this.open[i], pips=(price-t.op)*(t.side==='BUY'?1:-1);
    t.pl=pips*t.lots*10; t.pips=pips*10000; t.cp=price; t.ct=new Date().toISOString();
    this.bal+=t.mg+t.pl; this.hist.unshift({...t}); this.open.splice(i,1);
    Log.add(uid,'TRADE_CLOSE',{id,price,pl:t.pl});
    this._fire(); return t;
  },
  tick(px){
    let fl=0;
    this.open.forEach(t=>{
      const p=px[t.pair];if(!p)return;
      t.cp=t.side==='BUY'?p.bid:p.ask;
      const pips=(t.cp-t.op)*(t.side==='BUY'?1:-1);
      t.pl=pips*t.lots*10; t.pips=pips*10000; fl+=t.pl;
    });
    this.eq=this.bal+fl; this._fire();
  },
  _fire(){this.subs.forEach(cb=>cb())},
  on(cb){this.subs.add(cb)},
  off(cb){this.subs.delete(cb)},
  stats(){
    const h=this.hist, w=h.filter(t=>t.pl>0), l=h.filter(t=>t.pl<=0);
    const tp=h.reduce((a,t)=>a+t.pl,0);
    const aw=w.length?w.reduce((a,t)=>a+t.pl,0)/w.length:0;
    const al=l.length?l.reduce((a,t)=>a+t.pl,0)/l.length:0;
    const mg=this.open.reduce((a,t)=>a+t.mg,0);
    return{bal:this.bal,eq:this.eq,open:this.open.length,total:h.length,
      wr:h.length?((w.length/h.length)*100).toFixed(1):0,
      tp:tp.toFixed(2),aw:aw.toFixed(2),al:al.toFixed(2),
      pf:al?Math.abs(aw/al).toFixed(2):'∞',mg,fm:this.bal-mg,
      ml:this.open.length?((this.eq/(mg||1))*100).toFixed(1):'∞'};
  }
};

function drawChart(cid,pair){
  const can=document.getElementById(cid);if(!can)return;
  const W=can.offsetWidth||800, H=can.offsetHeight||300;
  can.width=W; can.height=H;
  const ctx=can.getContext('2d');
  const pad={t:18,r:62,b:26,l:8};
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const data=Mkt.candles[pair]||[];if(!data.length)return;
  const vis=data.slice(-80);
  const mn=Math.min(...vis.map(c=>c.l)), mx=Math.max(...vis.map(c=>c.h)), rng=mx-mn||1;

  ctx.fillStyle=C.chart; ctx.fillRect(0,0,W,H);

  for(let i=0;i<=5;i++){
    const y=pad.t+(cH/5)*i;
    ctx.strokeStyle='rgba(26,48,72,.5)'; ctx.lineWidth=.5;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    const pr=mx-(rng/5)*i;
    ctx.fillStyle=C.mut; ctx.font='10px JetBrains Mono'; ctx.textAlign='left';
    ctx.fillText(pr.toFixed(dp(pair)),W-pad.r+4,y+4);
  }

  const cw=Math.max(2,cW/vis.length-1.2);
  vis.forEach((c,i)=>{
    const x=pad.l+(i/(vis.length-1||1))*cW;
    const yH=pad.t+((mx-c.h)/rng)*cH, yL=pad.t+((mx-c.l)/rng)*cH;
    const yO=pad.t+((mx-Math.max(c.o,c.c))/rng)*cH;
    const yC=pad.t+((mx-Math.min(c.o,c.c))/rng)*cH;
    const bull=c.c>=c.o, col=bull?C.grn:C.red;
    ctx.strokeStyle=col; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,yH); ctx.lineTo(x,yL); ctx.stroke();
    ctx.fillStyle=col+'BB'; ctx.fillRect(x-cw/2,yO,cw,Math.max(1,yC-yO));
  });

  const ma=[];
  for(let i=19;i<vis.length;i++){const av=vis.slice(i-19,i+1).reduce((a,c)=>a+c.c,0)/20;ma.push({i,v:av});}
  if(ma.length){
    ctx.beginPath(); ctx.strokeStyle=C.ora+'BB'; ctx.lineWidth=1.5;
    ma.forEach(({i,v},ix)=>{
      const x=pad.l+(i/(vis.length-1||1))*cW, y=pad.t+((mx-v)/rng)*cH;
      ix===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  }

  const lp=(vis[vis.length-1]||{}).c||0;
  const lpy=pad.t+((mx-lp)/rng)*cH;
  ctx.strokeStyle=C.acc+'77'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(pad.l,lpy); ctx.lineTo(W-pad.r,lpy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=C.acc; ctx.fillRect(W-pad.r,lpy-9,pad.r,18);
  ctx.fillStyle=C.bg; ctx.font='bold 10px JetBrains Mono'; ctx.textAlign='center';
  ctx.fillText(lp.toFixed(dp(pair)),W-pad.r+30,lpy+4);
}

function drawMini(cid,data,col,h=34){
  const can=document.getElementById(cid);if(!can||!data.length)return;
  const W=can.offsetWidth||120;
  can.width=W; can.height=h;
  const ctx=can.getContext('2d');
  const pts=data.map(d=>d.c||d);
  const mn=Math.min(...pts), mx=Math.max(...pts), rng=mx-mn||1;
  ctx.clearRect(0,0,W,h);
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x=(i/(pts.length-1||1))*W, y=h-((p-mn)/rng)*(h-4)-2;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.stroke();
  ctx.lineTo(W,h); ctx.lineTo(0,h); ctx.closePath();
  ctx.fillStyle=col+'22'; ctx.fill();
}

function buildAuth(){
  const wrap=document.getElementById('screen-auth');
  let mode='login';

  function render(){
    wrap.innerHTML=`
    <div class="hero-glow"></div>
    <div id="A">
      <div class="auth-wrap">
        <div class="tc mb20">
          <div class="auth-logo">NX</div>
          <h1 class="raj f800 c-text" style="font-size:26px;letter-spacing:3px">NEXUS</h1>
          <p class="c-muted fs10 mt4" style="letter-spacing:1.5px">Institutional-Grade Trading Intelligence</p>
        </div>
        <div class="card p24">
          <div class="flex g4 mb16" style="background:var(--bgPanel);border-radius:6px;padding:4px">
            <button class="seg-btn" id="s-login" style="background:${mode==='login'?C.acc:'transparent'};color:${mode==='login'?C.bg:C.mut}">LOGIN</button>
            <button class="seg-btn" id="s-reg"   style="background:${mode==='register'?C.acc:'transparent'};color:${mode==='register'?C.bg:C.mut}">REGISTER</button>
          </div>
          ${mode==='register'?`<div class="mb10"><span class="lbl">Full Name</span><input class="inp" id="a-name" placeholder="Your full name"/></div>`:''}
          <div class="mb10"><span class="lbl">Email Address</span><input class="inp" id="a-email" type="email" placeholder="trader@example.com"/></div>
          <div class="mb${mode==='register'?10:20}"><span class="lbl">Password</span><input class="inp" id="a-pwd" type="password" placeholder="••••••••"/></div>
          ${mode==='register'?`
          <div class="mb10"><span class="lbl">Confirm Password</span><input class="inp" id="a-pwd2" type="password" placeholder="••••••••"/></div>
          <div class="mb8 flex g8 aifs"><input type="checkbox" id="a-gdpr" style="margin-top:3px;flex-shrink:0"/><span style="font-size:11px;color:${C.mut};line-height:1.6">I consent to processing of personal data per the <span style="color:${C.acc};cursor:pointer">Privacy Policy</span> &amp; <span style="color:${C.acc}">GDPR Notice</span>.</span></div>
          <div class="mb16 flex g8 aifs"><input type="checkbox" id="a-terms" style="margin-top:3px;flex-shrink:0"/><span style="font-size:11px;color:${C.mut};line-height:1.6">I accept the <span style="color:${C.acc};cursor:pointer">Terms of Service</span>, <span style="color:${C.acc}">Risk Disclosure</span> &amp; Trading Policies.</span></div>`:''}
          <div class="err-box" id="a-err"></div>
          <button class="btn btn-primary w100" id="a-go" style="padding:12px 0;font-size:13px;letter-spacing:1.5px">
            ${mode==='login'?'SECURE LOGIN &rarr;':'CREATE ACCOUNT &rarr;'}
          </button>
          ${mode==='login'?`<div class="demo-box">
            <div class="c-dim fs10 mb6" style="letter-spacing:1px">DEMO CREDENTIALS</div>
            <div class="mono c-muted fs11">Admin:&nbsp; admin@nexus.com &nbsp;/&nbsp; Admin123!</div>
            <div class="mono c-muted fs11 mt4">Trader: trader@nexus.com &nbsp;/&nbsp; Trade123!</div>
          </div>`:''}
        </div>
        <div class="tc mt12 c-dim fs10" style="line-height:1.9">
          AES-256 &bull; GDPR &bull; SOC 2 Type 2 &bull; Rate-limited auth<br>
          Trading involves substantial risk. Past results ≠ future performance.
        </div>
      </div>
    </div>`;

    document.getElementById('s-login').onclick=()=>{mode='login';render()};
    document.getElementById('s-reg').onclick=()=>{mode='register';render()};

    const err=e=>{const el=document.getElementById('a-err');el.textContent=e;el.style.display='block'};
    const go=document.getElementById('a-go');

    go.onclick=async()=>{
      const email=Sec.clean((getV('a-email')||'').toLowerCase());
      const pwd=getV('a-pwd')||'';
      if(!Sec.email(email)){err('Invalid email format.');return}
      if(mode==='login'){
        if(LOCKED){err('Account locked. Try again in 15 minutes.');return}
        go.innerHTML='<span class="loader"></span>';go.disabled=true;
        try {
          let u;
          if (await API.probe()) {
            u = await API.login(email, pwd);
          } else {
            if(LOCKED){throw new Error('Account locked. Try again in 15 minutes.');}
            await new Promise(r=>setTimeout(r,450));
            u=Users.find(u=>u.email===email&&u.hash===Sec.hash(pwd)&&u.active);
            if(!u){ FAILS++;if(FAILS>=5)LOCKED=true; throw new Error(`Invalid credentials. ${Math.max(0,5-FAILS)} attempts remaining.`); }
          }
          FAILS=0; CU=u; Log.add(u.id,'LOGIN_OK',{email,mode:API.isAPIMode?'api':'demo'});
          if(u.role==='ADMIN'){buildAdmin();show('admin');}
          else{buildTerminal();show('term');}
        } catch(e) {
          err(e.message||'Login failed. Please try again.');
          go.innerHTML='SECURE LOGIN &rarr;';go.disabled=false;
        }
      } else {
        const name=Sec.clean(getV('a-name')||'');
        const pwd2=getV('a-pwd2')||'';
        const gdpr=document.getElementById('a-gdpr')?.checked;
        const terms=document.getElementById('a-terms')?.checked;
        if(pwd.length<8){err('Password must be 8+ characters.');return}
        if(!/(?=.*[A-Z])(?=.*[0-9])/.test(pwd)){err('Needs uppercase letter and number.');return}
        if(pwd!==pwd2){err('Passwords do not match.');return}
        if(!gdpr||!terms){err('Accept all policies to continue.');return}
        try {
          let u;
          if (await API.probe()) {
            u = await API.register(email, pwd, name, true);
          } else {
            if(Users.find(u=>u.email===email)){throw new Error('Email already registered.');}
            u={id:'u'+Date.now(),email,hash:Sec.hash(pwd),role:'USER',name,since:new Date().toISOString().slice(0,10),mfa:false,gdpr:true,active:true};
            Users.push(u);
          }
          Log.add(u.id,'REGISTER',{email,mode:API.isAPIMode?'api':'demo'});CU=u;
          buildTerminal();show('term');
        } catch(e) {
          err(e.message||'Registration failed. Please try again.');
          go.innerHTML='CREATE ACCOUNT &rarr;';go.disabled=false;
        }
      }
    };

    const onEnter=e=>{if(e.key==='Enter')go.click()};
    document.getElementById('a-email').addEventListener('keydown',onEnter);
    document.getElementById('a-pwd').addEventListener('keydown',onEnter);
  }
  render();
}

    if(t==='copy')      renderCopy();

  document.getElementById('btn-out').onclick=()=>{

    buildLanding();show('landing');

  // ── WATCHLIST ─────────────────────────────────────────
  function buildWL(){
    const s=(document.getElementById('wl-s')?.value||'').toLowerCase();
    const list=document.getElementById('wl-list');if(!list)return;
    list.innerHTML='';
    PAIRS.filter(p=>p.toLowerCase().includes(s)).forEach(pair=>{
      const px=Mkt.px[pair];if(!px)return;
      const up=(px.chg||0)>=0;
      const row=document.createElement('div');
      row.className='wl-row'+(pair===PAIR?' sel':'');
      row.innerHTML=`<div>
        <div class="raj f700 fs12 ${pair===PAIR?'c-accent':'c-text'}" style="letter-spacing:.5px">${pair}</div>

      </div>`;
      row.onclick=()=>{PAIR=pair;buildWL();updateChart();updateOrder();};
      list.appendChild(row);
    });
  }
  document.getElementById('wl-s').oninput=buildWL;

    const price=side==='BUY'?px.ask:px.bid;

    CE.mirror(t);
    notif(`✓ ${side} ${lots} ${PAIR} @ ${fmt(price,PAIR)}`);

  document.getElementById('btn-buy').onclick=()=>doTrade('BUY');
  document.getElementById('btn-sell').onclick=()=>doTrade('SELL');

  // ── CLOSE TRADE (global for inline onclick) ───────────
  window._closeT=(id)=>{
    const t=TE.open.find(x=>x.id===id);if(!t)return;
    const px=Mkt.px[t.pair];
    const closed=TE.close(id,px?.bid||0,CU.id);
    if(closed){CE.mirror(closed);notif(`✓ Closed #${id} | P&L: ${closed.pl>=0?'+':''}$${fm2(closed.pl)}`,closed.pl>=0?C.grn:C.red);}
    refreshOT();updateStats();
  };

  // ── OPEN TRADES REFRESH ───────────────────────────────

        <tbody>${TE.open.map(t=>`<tr>

        renderFull();

        renderFull();
      }

      if(sendBtn) sendBtn.onclick=sendMsg;
      if(inp) inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}};
    }

          <div class="raj f700 fs13 ls1 mb12">MQL5 EA GENERATOR</div>
          <div class="g2 mb10">
            ${[['lots','0.01','Lot Size'],['sl','50','Stop Loss (pips)'],['tp','100','Take Profit (pips)'],['risk','1.0','Risk %'],['magic','12345','Magic Number']].map(([k,d,lbl])=>`
            <div><span class="lbl">${lbl}</span><input class="inp inp-mono ea-in" data-k="${k}" value="${d}"/></div>`).join('')}
          </div>
          <div id="ea-prev" style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px;max-height:180px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);line-height:1.7;white-space:pre">${MT5.genEA({lots:'0.01',sl:'50',tp:'100',risk:'1.0',magic:'12345'})}</div>
          <button class="btn btn-primary w100 mt10" id="ea-dl" style="font-size:11px">⬇ DOWNLOAD EA (.mq5)</button>
        </div>
      </div>`;

      // Broker search autocomplete
      const srvInp=document.getElementById('m-srv');
      const dd=document.getElementById('m-srv-dd');
      let searchTimer;
      srvInp.oninput=()=>{
        clearTimeout(searchTimer);
        const q=srvInp.value.trim();
        if(!q){dd.style.display='none';return;}
        searchTimer=setTimeout(async()=>{
          try{
            let results;
            if(API.isAPIMode){ results=await API.searchBrokers(q); }
            else{ results=BROKERS.filter(b=>b.broker_name.toLowerCase().includes(q.toLowerCase())||b.server_name.toLowerCase().includes(q.toLowerCase())).slice(0,8); }
            if(!results.length){dd.style.display='none';return;}
            dd.innerHTML=results.slice(0,10).map(b=>`<div class="dd-item" data-srv="${b.server_name}" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:11px">
              <span class="c-accent f700">${b.broker_name}</span>
              <span class="c-muted ml8">${b.server_name}</span>
              <span class="badge b-neutral ml8" style="font-size:9px">${b.account_type||'LIVE'}</span>
            </div>`).join('');
            dd.style.display='block';
            qsa('.dd-item',dd).forEach(item=>{ item.onmousedown=()=>{ srvInp.value=item.dataset.srv; dd.style.display='none'; }; });
          }catch(e){}
        },300);
      };
      document.addEventListener('click',e=>{if(!srvInp.contains(e.target))dd.style.display='none;'},{once:false});

      // Connect button
      document.getElementById('mt5-con').onclick=async()=>{
        const s=srvInp.value.trim(),l=getV('m-log'),p=getV('m-pwd'),lbl=getV('m-lbl')||l,typ=document.getElementById('m-type').value,cur=getV('m-cur')||'USD';
        if(!s||!l){notif('Server and login required',C.red);return;}
        MT5.connect(s,l);
        if(API.isAPIMode){
          try{
            const acc=await API.addAccount({label:lbl,login:l,server:s,account_type:typ,currency:cur});
            window._mt5Accounts=[...window._mt5Accounts,acc];
            window._CU_ACCOUNT_ID=acc.id;
            notif('✓ Account added: '+lbl);draw();
          }catch(e){notif('Error: '+e.message,C.red);}
        }else{
          notif('✓ MT5 Connected to '+s+' (demo mode)');renderMT5();
        }
      };

      // Delete account buttons
      qsa('[data-del]',v).forEach(btn=>{ btn.onclick=async()=>{
        const id=btn.dataset.del;
        if(API.isAPIMode){try{await API.deleteAccount(id);}catch(e){}}
        window._mt5Accounts=window._mt5Accounts.filter(a=>a.id!==id);
        if(window._CU_ACCOUNT_ID===id)window._CU_ACCOUNT_ID=null;
        draw();
        notif('Account removed',C.ora);
      };});

      // EA generator
      const eaPrev=document.getElementById('ea-prev');
      function getEAS(){const s={};qsa('.ea-in').forEach(i=>s[i.dataset.k]=i.value);return s;}
      qsa('.ea-in').forEach(i=>i.oninput=()=>{if(eaPrev)eaPrev.textContent=MT5.genEA(getEAS());});
      document.getElementById('ea-dl').onclick=()=>{
        const b=new Blob([MT5.genEA(getEAS())],{type:'text/plain'});
        const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='NEXUS_EA.mq5';a.click();
        notif('✓ NEXUS_EA.mq5 downloaded');
      };
    }
    draw();
  }

  function renderCopy(){
    const v=document.getElementById('P-copy');if(!v)return;
    if(!window._copyAccounts) window._copyAccounts=[...CE.accs];

    async function load(){
      if(API.isAPIMode){
        try{ window._copyAccounts=await API.getCopyAccounts(); }catch(e){}
      }
    }

    async function draw(){
      await load();
      const accs=window._copyAccounts;
      v.innerHTML=`
      <div class="raj f800 mb16" style="font-size:18px;letter-spacing:2px;color:var(--text)">COPY TRADING — UNLIMITED ACCOUNTS</div>
      <div class="card p16 mb12">
        <div class="raj f700 fs13 ls1 mb12">ADD COPY ACCOUNT</div>
        <div class="g2 mb10">
          <div><span class="lbl">Account Label</span><input class="inp" id="cp-n" placeholder="My Copy Account"/></div>
          <div><span class="lbl">Risk %</span><input class="inp inp-mono" id="cp-r" value="100"/></div>
          <div><span class="lbl">Server</span><input class="inp" id="cp-srv" placeholder="Broker server name"/></div>
          <div><span class="lbl">Login</span><input class="inp inp-mono" id="cp-log" placeholder="Account number"/></div>
          <div class="span2"><span class="lbl">Max Lots (optional)</span><input class="inp inp-mono" id="cp-ml" placeholder="e.g. 1.00"/></div>
        </div>
        <label class="flex aic g8 mb10 fs11 c-muted" style="cursor:pointer">
          <input type="checkbox" id="cp-rev"/> Reverse trades (SELL when source BUYS)
        </label>
        <button class="btn btn-primary w100 fs11" id="cp-add">+ ADD ACCOUNT</button>
      </div>
      ${!accs.length?'<div class="c-muted fs11 tc" style="padding:22px 0">No copy accounts yet. Add unlimited above.</div>':
        accs.map(a=>`
        <div class="card p12 mb8">
          <div class="flex jcb aic mb6">
            <div>
              <div class="raj f700 fs13 c-text">${a.label||a.name||'Account'}</div>
              <div class="mono fs10 c-muted mt2">${a.server||''} ${a.login?'#'+a.login:''} &bull; Risk: ${a.risk_pct||a.rsk||100}%${a.max_lots?' &bull; Max:'+a.max_lots:''}${a.reverse?' &bull; REVERSED':''}</div>
            </div>
            <div class="flex aic g8">
              <label class="flex aic g6 fs10 c-muted" style="cursor:pointer">
                <input type="checkbox" class="cp-toggle" data-id="${a.id}" ${(a.active!==false&&a.on!==false)?'checked':''}/>ACTIVE
              </label>
              <button class="btn btn-danger btn-sm cp-del" data-id="${a.id}">✕</button>
            </div>
          </div>
          ${a.total_pl!=null?`<div class="mono fs10 ${a.total_pl>=0?'c-green':'c-red'}">P&L: ${a.total_pl>=0?'+':''}$${parseFloat(a.total_pl).toFixed(2)}</div>`:''}
        </div>`).join('')}`;

      document.getElementById('cp-add').onclick=async()=>{
        const n=getV('cp-n'),srv=getV('cp-srv'),log=getV('cp-log'),r=parseFloat(getV('cp-r')||100),ml=getV('cp-ml'),rev=document.getElementById('cp-rev')?.checked;
        if(!n||!srv||!log){notif('Label, server and login required',C.red);return;}
        if(API.isAPIMode){
          try{
            const acc=await API.addCopyAccount({label:n,server:srv,login:log,risk_pct:r,max_lots:ml?parseFloat(ml):null,reverse:rev||false,source_id:window._CU_ACCOUNT_ID||null});
            window._copyAccounts=[...window._copyAccounts,acc];
            notif('✓ Copy account added: '+n);draw();
          }catch(e){notif('Error: '+e.message,C.red);}
        }else{
          CE.add(n,srv,r);window._copyAccounts=[...CE.accs];notif('✓ Added: '+n);draw();
        }
      };

      qsa('.cp-toggle',v).forEach(cb=>{ cb.onchange=async()=>{
        const id=cb.dataset.id,active=cb.checked;
        if(API.isAPIMode){try{await API.updateCopyAccount(id,{active});}catch(e){}}
        else{const a=CE.accs.find(a=>a.id==id);if(a)a.on=active;}
      };});

      qsa('.cp-del',v).forEach(btn=>{ btn.onclick=async()=>{
        const id=btn.dataset.id;
        if(API.isAPIMode){try{await API.deleteCopyAccount(id);}catch(e){}}
        else{CE.rm(parseInt(id));}
        window._copyAccounts=window._copyAccounts.filter(a=>a.id!=id);
        notif('Copy account removed',C.ora);draw();
      };});
    }
    draw();
  }

  function renderAudit(){
    const v=document.getElementById('P-audit');if(!v)return;
    v.innerHTML='<div class="c-muted fs11 tc" style="padding:22px 0"><span class="loader"></span> Loading...</div>';
    const sc={INFO:C.mut,WARN:C.ora,ERROR:C.red};

    async function load(){
      let logs=[];
      if(API.isAPIMode){
        try{ logs=await API.getAuditLog(); }catch(e){ logs=Log.get(CU.id,false); }
      }else{
        logs=Log.get(CU.id,false);
      }
      v.innerHTML=`
      <div class="card p16">
        <div class="flex jcb aic mb12">
          <span class="raj f700 fs13 ls1">ACTIVITY LOG (${logs.length} events)</span>
          ${API.isAPIMode?'<span class="mono fs10 c-green">● Live DB</span>':'<span class="mono fs10 c-muted">● Demo</span>'}
        </div>
        <div style="max-height:500px;overflow-y:auto">
          ${!logs.length?'<div class="c-muted fs11 tc" style="padding:22px 0">No activity yet</div>':
          logs.slice(0,200).map(l=>`
          <div class="flex g10" style="padding:5px 0;border-bottom:1px solid rgba(26,48,72,.3);font-family:'JetBrains Mono',monospace;font-size:10px;align-items:flex-start">
            <span class="c-dim nowrap shrink0" style="width:68px">${(l.ts||l.created_at||'').slice(11,19)}</span>
            <span class="nowrap shrink0" style="color:${sc[l.sev||l.severity]||C.mut};width:42px">${l.sev||l.severity||'INFO'}</span>
            <span class="c-accent nowrap shrink0" style="width:140px;overflow:hidden;text-overflow:ellipsis">${l.action}</span>
            <span class="c-muted" style="word-break:break-all">${typeof l.data==='string'?l.data:JSON.stringify(l.data||{})}</span>
          </div>`).join('')}
        </div>
      </div>`;
    }
    load();
  }

  // ── INIT ──────────────────────────────────────────────
  Log.add(CU.id,'TERMINAL_OPEN',{role:CU.role});
  requestAnimationFrame(()=>{buildWL();updateChart();updateOrder();buildTicker();updateStats();});
}

// ═══════════════════════════════════════════════════════════
//  ADMIN DASHBOARD
// ═══════════════════════════════════════════════════════════
function buildAdmin(){
  const wrap=document.getElementById('screen-admin');
  let aTab='overview';

  function auditTable(logs,max=50){
    const sc={INFO:C.mut,WARN:C.ora,ERROR:C.red};
    if(!logs||!logs.length)return '<div class="c-muted fs11 tc" style="padding:16px">No audit events</div>';
    return `<div style="max-height:360px;overflow-y:auto"><table>
      <thead><tr><th>Time</th><th>Severity</th><th>Action</th><th>Data</th></tr></thead>
      <tbody>${logs.slice(0,max).map(l=>`<tr>
        <td class="c-dim nowrap" style="font-size:10px">${(l.ts||l.created_at||'').slice(11,19)||'—'}</td>
        <td style="color:${sc[l.sev||l.severity]||C.mut};font-size:10px">${l.sev||l.severity||'INFO'}</td>
        <td class="c-accent nowrap" style="font-size:10px">${l.action}</td>
        <td class="c-muted" style="font-size:10px;word-break:break-all;max-width:300px">${typeof l.data==='string'?l.data:JSON.stringify(l.data||{})}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  async function render(){
    wrap.innerHTML=`
    <div id="AD">
      <div id="AD-hdr">
        <div class="flex aic g10">
          <span class="raj f800 c-orange" style="font-size:18px;letter-spacing:3px">NEXUS ADMIN</span>
          <span class="badge b-admin">ADMINISTRATOR</span>
          ${API.isAPIMode?'<span class="mono fs10 c-green">● API</span>':'<span class="mono fs10 c-ora">● Demo</span>'}
        </div>
        <div class="flex aic g4">
          <div class="tabs">
            ${['overview','users','audit','mt5','copy','policies'].map(t=>`<button class="tab${t===aTab?' on':''} ad-t" data-t="${t}">${t.toUpperCase()}</button>`).join('')}
          </div>
          <button class="btn btn-danger btn-sm ml8" id="ad-out">LOGOUT</button>
        </div>
      </div>
      <div id="AD-body"><div class="c-muted fs11 tc" style="padding:30px"><span class="loader"></span> Loading...</div></div>
    </div>`;

    qsa('.ad-t').forEach(b=>b.onclick=()=>{aTab=b.dataset.t;render();});
    document.getElementById('ad-out').onclick=()=>{
      API.logout();Log.add(CU.id,'LOGOUT',{});sessionStorage.removeItem('nx');CU=null;
      buildLanding();show('landing');
    };

    const body=document.getElementById('AD-body');

    if(aTab==='overview'){
      let stats=null;
      if(API.isAPIMode){try{stats=await API.getAdminStats();}catch(e){}}
      const u=stats?.users||{total:Users.length,active:Users.filter(u=>u.active).length,new_7d:0,active_24h:0};
      const t=stats?.trades||{total:TE.hist.length,open:TE.open.length,closed:TE.hist.length,total_profit:TE.stats().tp};
      const ac=stats?.accounts||{total:0,live:0,demo:0,connected:0};
      const cp=stats?.copy||{total:CE.accs.length,active:CE.accs.filter(a=>a.on).length};
      body.innerHTML=`
      <div class="gauto mb16">
        ${[
          ['Total Users',u.total,'👥','c-accent'],
          ['Active Users',u.active,'✅','c-green'],
          ['New (7d)',u.new_7d,'📈','c-orange'],
          ['Online (24h)',u.active_24h,'🟢','c-green'],
          ['MT5 Accounts',ac.total,'🔗','c-accent'],
          ['Live Accounts',ac.live,'📡','c-green'],
          ['Total Trades',t.total,'📊','c-accent'],
          ['Open Trades',t.open,'⚡','c-orange'],
          ['Total P&L','$'+parseFloat(t.total_profit||0).toFixed(2),'💰',parseFloat(t.total_profit||0)>=0?'c-green':'c-red'],
          ['Copy Accounts',cp.total,'🔄','c-purple'],
        ].map(([l,val,ic,c])=>`
        <div class="card p16" style="animation:slideIn .3s ease">
          <div class="flex jcb aifs">
            <div><div class="lbl">${l}</div><div class="raj f800 ${c}" style="font-size:20px;margin-top:4px">${val}</div></div>
            <span style="font-size:20px;opacity:.35">${ic}</span>
          </div>
        </div>`).join('')}
      </div>
      ${stats?.recent_audit?`<div class="card p16"><div class="raj f700 fs13 ls1 mb10">RECENT AUDIT LOG</div>${auditTable(stats.recent_audit,20)}</div>`:''}`;
    }

    if(aTab==='users'){
      let users=Users;
      if(API.isAPIMode){try{users=await API.getAdminUsers();}catch(e){}}
      body.innerHTML=`
      <div class="card p16">
        <div class="raj f700 fs13 ls1 mb14">USER MANAGEMENT (${users.length} users)</div>
        <div class="ox"><table>
          <thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Registered</th><th>Last Login</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${users.map(u=>`<tr>
            <td class="c-accent">${u.email}</td>
            <td class="c-text">${u.name||'—'}</td>
            <td><span class="badge ${u.role==='ADMIN'?'b-warn':'b-neutral'}">${u.role}</span></td>
            <td class="c-muted fs10">${(u.since||u.created_at||'').slice(0,10)||'—'}</td>
            <td class="c-muted fs10">${(u.last_login||'').slice(0,16)||'—'}</td>
            <td><span class="badge ${(u.active!==false&&u.active!==0)?'b-buy':'b-sell'}">${(u.active!==false&&u.active!==0)?'ACTIVE':'INACTIVE'}</span></td>
            <td>
              ${CU.id!==u.id&&API.isAPIMode?`<button class="btn btn-danger btn-sm usr-deact" data-id="${u.id||u.email}" data-active="${u.active}">
                ${(u.active!==false&&u.active!==0)?'DEACTIVATE':'RESTORE'}
              </button>`:'—'}
            </td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>`;

      qsa('.usr-deact',body).forEach(btn=>{btn.onclick=async()=>{
        const id=btn.dataset.id,active=btn.dataset.active==='false'||btn.dataset.active==='0';
        try{await API.updateUser(id,{active});notif(active?'User restored':'User deactivated',active?C.grn:C.ora);render();}
        catch(e){notif('Error: '+e.message,C.red);}
      };});
    }

    if(aTab==='audit'){
      let logs=Log.get(CU.id,true);
      if(API.isAPIMode){try{logs=await API.getAuditLog();}catch(e){}}
      body.innerHTML=`<div class="card p16">
        <div class="flex jcb aic mb10">
          <span class="raj f700 fs13 ls1">FULL AUDIT LOG (${logs.length} events)</span>
          ${API.isAPIMode?'<span class="mono fs10 c-green">● Live</span>':'<span class="mono fs10 c-muted">● Local</span>'}
        </div>
        ${auditTable(logs,500)}
      </div>`;
    }

    if(aTab==='mt5'){
      let accs=[];
      if(API.isAPIMode){try{accs=await API.getAccounts();}catch(e){}}
      body.innerHTML=`<div class="card p16">
        <div class="raj f700 fs13 ls1 mb12">ALL MT5 ACCOUNTS (${accs.length})</div>
        ${!accs.length?'<div class="c-muted fs11 tc" style="padding:16px">No accounts registered yet</div>':
        `<div class="ox"><table>
          <thead><tr><th>Label</th><th>Login</th><th>Server</th><th>Type</th><th>Currency</th><th>Balance</th><th>Status</th></tr></thead>
          <tbody>${accs.map(a=>`<tr>
            <td class="c-text f700">${a.label}</td>
            <td class="mono c-muted">${a.login}</td>
            <td class="c-muted fs10">${a.server}</td>
            <td><span class="badge ${a.account_type==='LIVE'?'b-buy':'b-neutral'}">${a.account_type}</span></td>
            <td class="c-muted">${a.currency||'USD'}</td>
            <td class="${a.balance>=0?'c-green':'c-red'}">${a.balance?'$'+parseFloat(a.balance).toFixed(2):'—'}</td>
            <td><span class="dot ${a.connected?'dot-g':'dot-d'}"></span></td>
          </tr>`).join('')}</tbody>
        </table></div>`}
      </div>`;
    }

    if(aTab==='copy'){
      let accs=[];
      if(API.isAPIMode){try{accs=await API.getCopyAccounts();}catch(e){}}
      body.innerHTML=`<div class="card p16">
        <div class="raj f700 fs13 ls1 mb12">COPY ACCOUNTS (${accs.length})</div>
        ${!accs.length?'<div class="c-muted fs11 tc" style="padding:16px">No copy accounts</div>':
        `<div class="ox"><table>
          <thead><tr><th>Label</th><th>Server</th><th>Login</th><th>Risk%</th><th>Status</th></tr></thead>
          <tbody>${accs.map(a=>`<tr>
            <td class="c-text">${a.label}</td>
            <td class="c-muted fs10">${a.server}</td>
            <td class="mono c-muted">${a.login}</td>
            <td>${a.risk_pct||100}%</td>
            <td><span class="badge ${a.active?'b-buy':'b-neutral'}">${a.active?'ACTIVE':'PAUSED'}</span></td>
          </tr>`).join('')}</tbody>
        </table></div>`}
      </div>`;
    }

    if(aTab==='policies'){
      body.innerHTML=`<div class="card p16">
        <div class="raj f700 fs13 ls1 mb12">PLATFORM POLICIES</div>
        ${[['Risk Management','Max 3 positions per account. Emotion Shield available. Daily loss limit configurable per account.'],['Data Retention','Trade history retained indefinitely. Audit logs retained 90 days. PII deleted on account closure (GDPR Art. 17).'],['Security','bcrypt (12 rounds) password hashing. JWT sessions with 24h expiry. Account locked after 5 failed login attempts.'],['Copy Trading','Unlimited copy accounts. Risk-adjusted lot sizing. Supports reverse copying. All trades audited.'],['AI Agent','Powered by Anthropic Claude claude-sonnet-4-20250514. No trade data sent externally except to AI API. Conversation history stored per user.']].map(([t,d])=>`
        <div class="card p12 mb10">
          <div class="c-accent f700 fs12 ls1 mb6">${t}</div>
          <div class="c-muted fs11 lh16">${d}</div>
        </div>`).join('')}
      </div>`;
    }
  }

  Log.add(CU.id,'ADMIN_OPEN',{});
  render();
}
